<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Indomoney Jakarta Bird</title>
    <style>
        body {
            margin: 0;
            background-color: #b71c1c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background: linear-gradient(to bottom, #1a4a4e, #4ec0ca);
            border: 6px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 90vh;
            display: block;
        }
        #rewardModal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            color: #000;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            z-index: 100;
            width: 85%;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            border: 4px solid #FFD700;
        }
        .modal-btn {
            background: #b71c1c;
            color: white;
            border: none;
            padding: 12px 18px;
            margin: 8px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="360" height="580"></canvas>

<div id="rewardModal">
    <h2 style="color:#b71c1c; margin-top:0;">SELAMAT!</h2>
    <p id="rewardText" style="font-size: 1.1rem; line-height: 1.4;"></p>
    <button id="claimBtn" class="modal-btn" onclick="claimReward()">AMBIL ONGKIR</button>
    <button id="continueBtn" class="modal-btn" style="background:#555" onclick="continueGame()">LANJUT KE TARGET</button>
    <div class="tagline">Indomoney: Aman, Cepat, Terpercaya</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const birdImg = new Image(); birdImg.src = 'bird.png';
    const logoImg = new Image(); logoImg.src = 'Logo.PNG';
    
    let birdY = 250, birdV = 0, pipes = [], score = 0, frame = 0;
    let gameOver = false, isPaused = false, gameStarted = false;
    let cityX = 0, lastTime = 0;
    const fpsLimit = 1000 / 60;
    const gravity = 0.45, jump = -7.5, birdSize = 55;
    let cloudLayers = [];
    let airplaneX = -400;
    let balloonX = 290, balloonY = 420;
    let buildingLights = [];

    let pipeInterval = 85;
    let pipeSpeed = 3.7;
    const PIPE_GAP = 105;

    function reset() {
        birdY = 250; birdV = 0;
        pipes = []; score = 0; frame = 0;
        gameOver = false; isPaused = false; gameStarted = false;
        cityX = 0;
        airplaneX = -400;
        balloonY = 420;
        pipeInterval = 85;
        pipeSpeed = 3.7;
        rewardsShown = { 5: false, 10: false, 15: false, 25: false };
        document.getElementById('rewardModal').style.display = 'none';
    }

    function initClouds() {
        cloudLayers = [
            { x: 0, y: 70, speed: 0.25, size: 1.1, opacity: 0.85 },
            { x: 180, y: 45, speed: 0.30, size: 0.95, opacity: 0.75 },
            { x: 320, y: 110, speed: 0.20, size: 1.25, opacity: 0.80 },
            { x: 80, y: 135, speed: 0.35, size: 0.85, opacity: 0.65 }
        ];
    }

    function initBuildingLights() {
        buildingLights = [];
        for (let i = 0; i < 35; i++) {
            buildingLights.push({
                x: Math.random() * 720,
                y: 260 + Math.random() * 240,
                size: 2.5 + Math.random() * 5,
                speed: 0.4 + Math.random() * 0.6,
                color: Math.random() > 0.5 ? "#ffeb3b" : "#4fc3f7",
                flicker: Math.random() * Math.PI * 2
            });
        }
    }

    function drawImprovedCloud(x, y, scale, opacity) {
        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.fillStyle = "#ffffff";
        ctx.scale(scale, scale);
        ctx.beginPath(); ctx.ellipse(x/scale, y/scale, 42, 19, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse((x+28)/scale, (y-7)/scale, 29, 17, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse((x-29)/scale, (y-5)/scale, 25, 16, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse((x+8)/scale, (y-12)/scale, 18, 12, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function drawAirplane(x, y) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = "#f8f8f8"; ctx.beginPath(); ctx.ellipse(0, 0, 38, 12, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#1e88e5"; ctx.beginPath(); ctx.ellipse(22, -2, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#f8f8f8";
        ctx.beginPath(); ctx.moveTo(-15, -8); ctx.lineTo(10, -22); ctx.lineTo(15, -8); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-15, 8); ctx.lineTo(10, 22); ctx.lineTo(15, 8); ctx.fill();
        ctx.fillStyle = "#b71c1c"; ctx.fillRect(-195, -14, 185, 28);
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.strokeRect(-195, -14, 185, 28);
        ctx.fillStyle = "white"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
        ctx.shadowBlur = 3; ctx.shadowColor = "black";
        ctx.fillText("KIRIM UANG CEPAT & AMAN", -102, 4);
        ctx.restore();
    }

    function drawBalloon(x, y) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = "#ff1744"; ctx.beginPath(); ctx.ellipse(0, -5, 26, 32, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.ellipse(-8, -12, 12, 18, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#4e342e"; ctx.fillRect(-9, 28, 18, 14);
        ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-15, 10); ctx.lineTo(-8, 28); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, 10); ctx.lineTo(8, 28); ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = "bold 11px Arial"; ctx.shadowBlur = 4; ctx.shadowColor = "#000";
        ctx.textAlign = "center"; ctx.fillText("TIDAK ADA LIBUR", 0, 2);
        ctx.restore();
    }

    function drawDetailedSkyscraper(offset) {
        ctx.fillStyle = "#1e2a35"; ctx.fillRect(offset + 15, 180, 78, 400);
        ctx.fillStyle = "rgba(255,255,255,0.08)"; ctx.fillRect(offset + 18, 180, 25, 400);
        ctx.fillStyle = "#a0e4ff";
        for (let row = 195; row < 540; row += 19) {
            for (let col = 0; col < 6; col++) {
                if ((row + col * 7) % 3 !== 0) {
                    ctx.fillRect(offset + 25 + col * 10, row, 6, 9);
                }
            }
        }
        ctx.fillStyle = "#b71c1c"; ctx.fillRect(offset + 12, 175, 84, 12);
        ctx.fillStyle = "#ffeb3b"; ctx.fillRect(offset + 28, 168, 52, 10);
        ctx.strokeStyle = "#ddd"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(offset + 52, 168); ctx.lineTo(offset + 52, 135); ctx.stroke();
        ctx.fillStyle = "#ffeb3b"; ctx.beginPath(); ctx.arc(offset + 52, 132, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#b71c1c"; ctx.fillRect(offset + 22, 145, 64, 22);
        ctx.fillStyle = "white"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
        ctx.fillText("INDOMONEY", offset + 54, 161);
    }

    function drawJakarta() {
        cityX -= 0.85;
        if (cityX < -360) cityX = 0;
        ctx.save(); ctx.translate(cityX, 0);
        for (let i = 0; i < 2; i++) {
            let offset = i * 360;
            ctx.fillStyle = "#263545"; ctx.fillRect(offset + 0, 240, 50, 340); ctx.fillRect(offset + 310, 215, 55, 365);
            drawDetailedSkyscraper(offset + 70);
            ctx.fillStyle = "#1f2c3a"; ctx.fillRect(offset + 220, 260, 68, 320);
            ctx.fillStyle = "#7ed6f0";
            for (let r = 275; r < 550; r += 21) {
                for (let c = 0; c < 5; c++) {
                    ctx.fillRect(offset + 230 + c*11, r, 5.5, 8);
                }
            }
        }
        ctx.shadowBlur = 9; ctx.shadowColor = "#ffffff";
        for (let light of buildingLights) {
            let lx = (light.x + cityX * 0.55) % 720;
            if (lx > 360) lx -= 720;
            const flicker = Math.sin(frame / 8 + light.flicker) * 0.3 + 0.7;
            ctx.globalAlpha = flicker;
            ctx.fillStyle = light.color;
            ctx.fillRect(lx, light.y, light.size, light.size);
        }
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        ctx.restore();
    }

    function drawPipe(p) {
        ctx.fillStyle = "#73bf2e";
        ctx.fillRect(p.x, 0, 55, p.top);
        ctx.fillRect(p.x, p.top + p.gap, 55, canvas.height);
        ctx.fillStyle = "#558022";
        ctx.fillRect(p.x + 40, 0, 15, p.top);
        ctx.fillRect(p.x + 40, p.top + p.gap, 15, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fillRect(p.x + 8, 0, 6, p.top);
        ctx.fillRect(p.x + 8, p.top + p.gap, 6, canvas.height);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 4;
        ctx.strokeRect(p.x - 3, p.top - 28, 61, 28);
        ctx.strokeRect(p.x - 3, p.top + p.gap, 61, 28);
    }

    function drawBird() {
        if (!birdImg.complete) return;
        ctx.save();
        ctx.translate(60, birdY);
        let rotation = birdV * 2.5;
        rotation = Math.max(Math.min(rotation, 25), -25);
        ctx.rotate(rotation * Math.PI / 180);
        ctx.drawImage(birdImg, -birdSize/2, -birdSize/2, birdSize, birdSize);
        ctx.restore();
    }

    function drawGameTitle() {
        ctx.textAlign = "center";
        ctx.fillStyle = "#ffff00";
        ctx.shadowColor = "#ffff00";
        ctx.shadowBlur = 30;
        ctx.font = "bold 29px Arial";
        ctx.fillText("SAYAP CUAN", canvas.width/2, 195);   // dinaikkan

        ctx.fillStyle = "#ff0033";
        ctx.shadowColor = "#ff0033";
        ctx.shadowBlur = 30;
        ctx.font = "bold 27px Arial";
        ctx.fillText("INDOMONEY", canvas.width/2, 228);   // dinaikkan
        ctx.shadowBlur = 0;
    }

    function drawOpeningScreen() {
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (logoImg.complete) {
            const logoH = 110;
            const ratio = logoImg.width / logoImg.height;
            const logoW = logoH * ratio;
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.7)";
            ctx.drawImage(logoImg, (canvas.width - logoW)/2, 12, logoW, logoH);
            ctx.restore();
        }

        drawGameTitle();

        ctx.fillStyle = "white";
        ctx.shadowBlur = 6;
        ctx.shadowColor = "#000";
        ctx.font = "bold 22px Arial";
        ctx.fillText("ATURAN PERMAINAN", canvas.width/2, 275);   // dinaikkan

        ctx.font = "bold 17.5px Arial";
        ctx.shadowBlur = 3;
        ctx.fillText("5 poin = kupon 25 nt", canvas.width/2, 310);
        ctx.fillText("10 poin = kupon 50 nt", canvas.width/2, 335);
        ctx.fillText("15 poin = kupon 75 nt", canvas.width/2, 360);
        ctx.fillText("25 poin = kupon gratis ongkir", canvas.width/2, 385);

        ctx.fillStyle = "#ffeb3b";
        ctx.font = "bold 21px Arial";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#b71c1c";
        ctx.fillText("TAP UNTUK MEMULAI", canvas.width/2, 445);  // dinaikkan
        ctx.shadowBlur = 0;
    }

    function update(timestamp) {
        const deltaTime = timestamp - lastTime;
        if (deltaTime >= fpsLimit) {
            lastTime = timestamp - (deltaTime % fpsLimit);
            frame++;

            const skyGrad = ctx.createLinearGradient(0, 0, 0, 340);
            skyGrad.addColorStop(0, "#1a4a4e");
            skyGrad.addColorStop(1, "#4ec0ca");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            cloudLayers.forEach(cloud => {
                drawImprovedCloud(cloud.x, cloud.y, cloud.size, cloud.opacity);
                cloud.x -= cloud.speed;
                if (cloud.x < -250) cloud.x = 620;
            });

            airplaneX += 1.4;
            if (airplaneX > canvas.width + 350) airplaneX = -380;
            drawAirplane(airplaneX, 78);

            drawJakarta();

            balloonY -= 0.35;
            if (balloonY < -80) balloonY = canvas.height + 90;
            drawBalloon(balloonX, balloonY);

            if (!gameStarted) {
                drawOpeningScreen();
                birdY = 250 + Math.sin(timestamp / 180) * 12;
            }
            else if (gameStarted && !gameOver && !isPaused) {
                birdV += gravity;
                birdY += birdV;
                if (birdY > canvas.height - 30 || birdY < 0) triggerGameOver();

                if (score >= 10) {
                    pipeInterval = 65;
                    pipeSpeed = 4.4;
                } else {
                    pipeInterval = 85;
                    pipeSpeed = 3.7;
                }

                if (frame % pipeInterval === 0) {
                    const top = Math.random() * (canvas.height - PIPE_GAP - 210) + 90;
                    pipes.push({ x: canvas.width, top, gap: PIPE_GAP, passed: false });
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    let p = pipes[i];
                    p.x -= pipeSpeed;
                    drawPipe(p);

                    if (60 + 18 > p.x && 60 - 18 < p.x + 55) {
                        if (birdY - 18 < p.top || birdY + 18 > p.top + p.gap)
                            triggerGameOver();
                    }

                    if (!p.passed && p.x < 60) {
                        score++;
                        p.passed = true;
                        if (score >= 25) {
                            gameOver = true;
                            showFinalReward();
                            return;
                        }
                        checkRewardTrigger();
                    }
                    if (p.x < -70) pipes.splice(i, 1);
                }
            }
            else if (gameOver) {
                pipes.forEach(drawPipe);
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 32px Arial";
                ctx.textAlign = "center";
                ctx.fillText("COBA LAGI!", canvas.width / 2, canvas.height / 2 + 90);
            }

            drawBird();

            if (logoImg.complete && gameStarted) {
                const logoH = 110;
                const ratio = logoImg.width / logoImg.height;
                const logoW = logoH * ratio;
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = "rgba(0,0,0,0.6)";
                ctx.drawImage(logoImg, (canvas.width - logoW)/2, 12, logoW, logoH);
                ctx.restore();

                ctx.fillStyle = "white";
                ctx.font = "bold 52px Arial";
                ctx.textAlign = "center";
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#000";
                ctx.fillText(score, canvas.width / 2, 172);
                ctx.shadowBlur = 0;
            }
        }
        requestAnimationFrame(update);
    }

    let currentFormLink = "";
    let rewardsShown = { 5: false, 10: false, 15: false, 25: false };

    function checkRewardTrigger() {
        let r = "", l = "";
        if (score === 5 && !rewardsShown[5]) {
            r = "Diskon 25nt"; l = "https://forms.cloud.microsoft/r/hHKjjf7Rxb";
            rewardsShown[5] = true;
        }
        else if (score === 10 && !rewardsShown[10]) {
            r = "Diskon 50nt"; l = "https://forms.cloud.microsoft/r/scikLq4LMR";
            rewardsShown[10] = true;
        }
        else if (score === 15 && !rewardsShown[15]) {
            r = "Diskon 75nt"; l = "https://forms.cloud.microsoft/r/jvdzw6Cuu2";
            rewardsShown[15] = true;
        }
       
        if (r !== "") {
            isPaused = true;
            currentFormLink = l;
            document.getElementById('rewardText').innerHTML = `Selamat! Anda dapat <b>${r}</b>.<br><br>Mau ambil kupon atau lanjut?`;
            document.getElementById('claimBtn').style.display = 'inline-block';
            document.getElementById('continueBtn').style.display = 'inline-block';
            document.getElementById('rewardModal').style.display = 'block';
        }
    }

    function showFinalReward() {
        isPaused = true;
        document.getElementById('rewardText').innerHTML = `SELAMAT!<br>Anda mencapai target akhir!<br><b>GRATIS ONGKIR</b>`;
        document.getElementById('claimBtn').style.display = 'inline-block';
        document.getElementById('continueBtn').style.display = 'none';
        document.getElementById('rewardModal').style.display = 'block';
    }

    function claimReward() {
        if (currentFormLink) window.open(currentFormLink, '_blank');
        reset();
    }

    function continueGame() {
        isPaused = false;
        birdV = jump;
        pipes = [];
        document.getElementById('rewardModal').style.display = 'none';
    }

    function triggerGameOver() {
        gameOver = true;
        setTimeout(reset, 1600);
    }

    const handleAction = (e) => {
        if (e && e.type === 'keydown' && e.code !== 'Space') return;
        if (e && e.cancelable) e.preventDefault();
        if (!gameStarted) {
            gameStarted = true;
            birdV = jump;
            initBuildingLights();
        } else if (!gameOver && !isPaused) {
            birdV = jump;
        }
    };

    window.addEventListener('keydown', handleAction);
    canvas.addEventListener('mousedown', handleAction);
    canvas.addEventListener('touchstart', handleAction, { passive: false });

    reset();
    initClouds();
    initBuildingLights();
    requestAnimationFrame(update);
</script>
</body>
</html>
